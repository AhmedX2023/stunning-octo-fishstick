<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — لابك عندنا</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body data-page="">

<div id="site-header-root"></div>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon">🔐</div>
    <h1>أهلاً بيك تاني</h1>
    <p class="sub">سجّل دخولك عشان تتابع طلباتك وتطلب بسهولة أكتر</p>

    <div class="auth-error-box" id="auth-error"></div>

    <form id="login-form" novalidate>
      <div class="field" id="field-email">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
        <div class="field-error"></div>
      </div>
      <div class="field" id="field-password">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        <div class="field-error"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-submit-btn">تسجيل الدخول</button>
    </form>

    <p class="auth-footer-link">معندكش حساب؟ <a href="register.html">سجّل دلوقتي</a></p>
    <p class="auth-footer-link" style="margin-top:6px"><a href="checkout.html">تابع كزائر بدون حساب ←</a></p>
  </div>
</main>

<div id="site-footer-root"></div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/toast.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth-pages.js"></script>
</body>
</html>
