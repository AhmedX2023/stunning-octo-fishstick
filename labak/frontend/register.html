<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — لابك عندنا</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body data-page="">

<div id="site-header-root"></div>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon">✨</div>
    <h1>اعمل حسابك دلوقتي</h1>
    <p class="sub">عشان تقدر تتابع طلباتك وتشتري بسهولة أكتر في كل مرة</p>

    <div class="auth-error-box" id="auth-error"></div>

    <form id="register-form" novalidate>
      <div class="field" id="field-full_name">
        <label for="full_name">الاسم الكامل</label>
        <input type="text" id="full_name" name="full_name" placeholder="مثال: أحمد محمد" required autocomplete="name">
        <div class="field-error"></div>
      </div>
      <div class="field" id="field-email">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
        <div class="field-error"></div>
      </div>
      <div class="field" id="field-phone">
        <label for="phone">رقم الهاتف (اختياري)</label>
        <input type="tel" id="phone" name="phone" placeholder="01XXXXXXXXX" autocomplete="tel">
        <div class="field-error"></div>
      </div>
      <div class="field" id="field-password">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" placeholder="8 أحرف على الأقل، حروف وأرقام" required autocomplete="new-password">
        <div class="password-strength" id="password-strength">
          <div></div><div></div><div></div>
        </div>
        <div class="field-error"></div>
        <div class="field-hint">لازم تحتوي على حروف وأرقام، وعلى الأقل 8 خانات</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="register-submit-btn">إنشاء الحساب</button>
    </form>

    <p class="auth-footer-link">عندك حساب بالفعل؟ <a href="login.html">سجّل دخولك</a></p>
  </div>
</main>

<div id="site-footer-root"></div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/toast.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth-pages.js"></script>
</body>
</html>
