<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — لابك عندنا</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body data-admin-page="dashboard" data-page-title="نظرة عامة">

<div class="admin-shell">
  <div id="admin-sidebar-root"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="admin-mobile-toggle btn btn-secondary btn-sm" id="admin-mobile-toggle">☰</button>
        <h1 id="admin-topbar-title"></h1>
      </div>
      <span class="text-faint" id="today-date" style="font-size:13px;color:var(--ink-faint)"></span>
    </div>

    <div class="admin-content">
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card"><div class="kpi-icon" style="background:rgba(124,58,237,0.18)">💰</div><div class="kpi-value">—</div><div class="kpi-label">جاري التحميل...</div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:rgba(240,51,155,0.18)">📦</div><div class="kpi-value">—</div><div class="kpi-label">جاري التحميل...</div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:rgba(251,192,45,0.18)">⏳</div><div class="kpi-value">—</div><div class="kpi-label">جاري التحميل...</div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:rgba(34,211,238,0.18)">👥</div><div class="kpi-value">—</div><div class="kpi-label">جاري التحميل...</div></div>
      </div>

      <div class="dashboard-grid">
        <div class="panel">
          <div class="panel-head">
            <h3>اتجاه المبيعات (آخر 14 يوم)</h3>
          </div>
          <div class="bar-chart" id="sales-chart"></div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>الطلبات حسب الحالة</h3></div>
          <div id="status-donut"></div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="panel">
          <div class="panel-head"><h3>الأكثر مبيعاً</h3></div>
          <div class="table-wrap">
            <table class="data-table" id="top-products-table">
              <thead><tr><th>المنتج</th><th>الكمية المباعة</th><th>الإيرادات</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>تنبيه المخزون</h3></div>
          <div id="low-stock-list"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="js/admin-shell.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
