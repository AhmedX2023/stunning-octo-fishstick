<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقارير — لابك عندنا</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body data-admin-page="reports" data-page-title="التقارير والإحصائيات">

<div class="admin-shell">
  <div id="admin-sidebar-root"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="admin-mobile-toggle btn btn-secondary btn-sm" id="admin-mobile-toggle">☰</button>
        <h1 id="admin-topbar-title"></h1>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" data-range="7">7 أيام</button>
        <button class="btn btn-primary btn-sm" data-range="14">14 يوم</button>
        <button class="btn btn-secondary btn-sm" data-range="30">30 يوم</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="kpi-grid" id="reports-kpi-grid"></div>

      <div class="panel">
        <div class="panel-head"><h3 id="sales-chart-title">اتجاه المبيعات</h3></div>
        <div class="bar-chart" id="reports-sales-chart"></div>
      </div>

      <div class="dashboard-grid">
        <div class="panel">
          <div class="panel-head"><h3>الأكثر مبيعاً (Top 10)</h3></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>#</th><th>المنتج</th><th>الكمية</th><th>الإيرادات</th></tr></thead>
              <tbody id="reports-top-products"></tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>توزيع المنتجات حسب البراند</h3></div>
          <div id="brand-distribution-chart"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="js/admin-shell.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
